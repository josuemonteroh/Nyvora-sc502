<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyvora - Login</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <div class="container">

        <div class="left-panel">

            <div class="branding">

                <img src="assets/logo.png" alt="Espitaleta Wellness">

                <p class="tagline">
                    Intelligent Nutrition Monitoring
                    <br>
                    &
                    <br>
                    Weight Management Platform
                </p>

            </div>

        </div>

        <div class="right-panel">

            <div class="login-card">

                <h2>Bienvenido de nuevo</h2>

                <p>
                    Inicia sesión para continuar en Espitaleta Wellness
                </p>

                <form action="pages/dashboard.html">

                    <label>Correo electrónico</label>

                    <input
                        type="email"
                        placeholder="Ingresa tu correo electrónico">

                    <label>Contraseña</label>

                    <input
                        type="password"
                        placeholder="Ingresa tu contraseña">

                    <div class="login-options">

                        <label class="remember">
                            <input type="checkbox">
                            Recordar sesión
                        </label>

                        <a href="#">
                            ¿Olvidó su contraseña?
                        </a>

                    </div>

                    <button type="submit">
                        Iniciar Sesión
                    </button>

                </form>

                <div class="register-link">

                    ¿No tiene una cuenta?

                    <a href="#">
                        Crear cuenta
                    </a>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
